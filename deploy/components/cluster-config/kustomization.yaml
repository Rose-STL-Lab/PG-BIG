# Cluster template — edit image and PVC for your environment (all jobs + dev pod).
#
#   images.newName / newTag  → container registry (default: ncking/pg-big on Nautilus)
#   pvc-patch*.yaml          → claimName on the pg-big PVC
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

images:
  - name: pg-big
    newName: ncking/pg-big
    newTag: latest

patches:
  - path: pvc-patch.yaml
    target:
      kind: Job
  - path: pvc-patch-pod.yaml
    target:
      kind: Pod
