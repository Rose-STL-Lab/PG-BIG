# Apply: kubectl apply -k deploy/jobs/train-profile-encoder
# Requires: retargeted .b3d data and VQ-VAE checkpoint (see configs/train_profile_encoder.json)
apiVersion: batch/v1
kind: Job
metadata:
  name: pg-big-train-profile-encoder
  labels:
    app: pg-big-train-profile-encoder
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: pg-big-train-profile-encoder
    spec:
      restartPolicy: Never
      containers:
      - name: pg-big-train-profile-encoder
        image: pg-big:latest
        imagePullPolicy: IfNotPresent
        workingDir: /mnt/PG-BIG
        env:
        - name: PG_BIG_RUN_LOG_ID
          value: "RUN_LOG_ID_PLACEHOLDER"
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -eo pipefail
          eval "$(conda shell.bash hook)"
          conda activate pg-big
          export LD_LIBRARY_PATH="${CONDA_PREFIX}/lib:${LD_LIBRARY_PATH:-}"
          export PYTHONPATH=/mnt/PG-BIG
          export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
          export OMP_NUM_THREADS=1 MKL_NUM_THREADS=1 OPENBLAS_NUM_THREADS=1
          VQVAE_CKPT="${VQVAE_CHECKPOINT:-/mnt/PG-BIG/outputs/VQVAE/VQVAE/300000.pth}"
          test -f "${VQVAE_CKPT}" || { echo "Missing VQ-VAE checkpoint: ${VQVAE_CKPT}"; exit 1; }
          test -d /mnt/PG-BIG/datasets/183_athletes/nimble_b3d || { echo "Missing nimble_b3d data"; exit 1; }
          python scripts/train_profile_encoder.py \
            --dataset-path /mnt/PG-BIG/datasets/183_athletes/nimble_b3d \
            --checkpoint-path "${VQVAE_CKPT}" \
            --out-dir /mnt/PG-BIG/outputs/profile_encoder/ \
            --exp-name profile_encoder_meta \
            --total-epochs 2500 \
            --batch-size 512 \
            --lr 1e-5
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: 32Gi
            cpu: "8"
          requests:
            nvidia.com/gpu: 1
            memory: 32Gi
            cpu: "8"
        volumeMounts:
        - name: data
          mountPath: /mnt
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: pg-big
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
