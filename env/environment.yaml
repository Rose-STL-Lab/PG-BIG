# PG-BIG: VQ-VAE + surrogate + guidance + OpenSim/Nimble physics.
# OpenSim 4.5.2 (py311np125) requires numpy 1.25.x.
#
# Local setup:
#   conda env create -f env/environment.yaml
#   conda activate pg-big
name: pg-big
channels:
  - pytorch
  - nvidia
  - conda-forge
  - opensim-org
dependencies:
  - python=3.11
  - numpy>=1.25,<1.26
  - opensim=4.5.2
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.8
  - pandas>=2.0
  - tensorboard>=2.14
  - spacy>=3.7
  - umap-learn>=0.5
  - ezc3d>=1.5
  - imageio>=2.34
  - openpyxl>=3.1
  - jupyter>=1.0
  - ipykernel>=6.25
  - notebook>=7.0
  - casadi>=3.6
  - pyyaml>=6.0
  - packaging>=23.0
  - tqdm>=4.66
  - pip
  - pytorch>=2.2
  - pytorch-cuda=12.4
  - torchvision
  - torchaudio
  - pip:
      - deepspeed
      - nimblephysics
      - smplx
      - transformers
      - chumpy
      - xgboost
      - moviepy
      - maskpass==0.3.6
      - python-decouple
      - requests
      - clip @ git+https://github.com/openai/CLIP.git
