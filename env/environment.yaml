# PG-BIG: based on SINDyffuse env (OpenSim 4.5.2 + Nimble + PyTorch).
# OpenSim 4.5.2 (py311np125) requires numpy 1.25.x; stay on numpy 1.x (<2).
#
# Local setup:
#   conda env create -f env/environment.yaml
#   conda activate pg-big
name: pg-big
channels:
  - pytorch
  - nvidia
  - conda-forge
  - opensim-org
dependencies:
  - python=3.11
  - numpy>=1.25,<1.26
  - opensim=4.5.2
  - ncurses>=6.5
  - libgfortran=3.0.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - joblib>=1.3
  - pillow>=10.0
  - matplotlib>=3.8
  - imageio>=2.34
  - pyvista>=0.43
  - packaging>=23.0
  - tqdm>=4.66
  - pandas>=2.0
  - tensorboard>=2.14
  - pip
  - pytorch>=2.2
  - pytorch-cuda=12.4
  - torchvision
  - torchaudio
  - pip:
      - nimblephysics
      - polyscope>=2.3.0
      - clip @ git+https://github.com/openai/CLIP.git
      - ftfy
      - regex
      - wcwidth
      - deepspeed
      - smplx
